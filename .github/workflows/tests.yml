name: Comprehensive Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Swift Tests (macOS)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14, macos-15]
        swift-version: ['5.9', '5.10']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Swift ${{ matrix.swift-version }}
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: ${{ matrix.swift-version }}
      
      - name: Cache Swift Package Manager
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ matrix.swift-version }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-${{ matrix.swift-version }}-
      
      - name: Build Package
        run: swift build -v
        timeout-minutes: 10
      
      - name: Run All Tests
        run: swift test -v --parallel
        timeout-minutes: 30
      
      - name: Run Tests with Coverage (macOS 15 only)
        if: matrix.os == 'macos-15' && matrix.swift-version == '5.10'
        run: swift test --enable-code-coverage --parallel
        timeout-minutes: 30

  smoke-tests:
    name: Smoke Tests Suite
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'
      
      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-swift-smoke-${{ hashFiles('**/Package.resolved') }}
      
      - name: Run Smoke Tests
        run: swift test -v --filter '(Smoke|Theme Smoke|LuxeCard Smoke|Glassmorphism Smoke|Refractive Glass Smoke|SmartSpring Smoke|MagneticPull Smoke|CircularProgressBar Smoke|Circular Progress Smoke|MultiThumbSlider Smoke|PredictiveLayout Smoke|Premium Components Smoke|TactileFeedback Smoke|Design Token Smoke|Library Smoke|View Modifier Smoke)'
        timeout-minutes: 20

  integration-tests:
    name: Integration Tests Suite
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'
      
      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-swift-integration-${{ hashFiles('**/Package.resolved') }}
      
      - name: Run Integration Tests
        run: swift test -v --filter 'Integration'
        timeout-minutes: 25

  gpu-tests:
    name: GPU Renderer Tests
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'
      
      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-swift-gpu-${{ hashFiles('**/Package.resolved') }}
      
      - name: Run GPU Renderer Tests
        run: swift test -v --filter 'GPURenderer'
        timeout-minutes: 20

  configuration-tests:
    name: Configuration Tests Suite
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'
      
      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-swift-config-${{ hashFiles('**/Package.resolved') }}
      
      - name: Run Configuration Tests
        run: swift test -v --filter 'Configuration'
        timeout-minutes: 25

  ui-tests:
    name: UI Tests Suite
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'
      
      - name: Cache SPM
        uses: actions/cache@v3
        with:
          path: .build
          key: ${{ runner.os }}-swift-ui-${{ hashFiles('**/Package.resolved') }}
      
      - name: Run UI Tests
        run: swift test -v --filter '(UI|UI Tests)'
        timeout-minutes: 30

  build-examples:
    name: Build Examples
    runs-on: macos-15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: '5.10'
      
      - name: Build Core Components Demo
        run: swift build
        working-directory: Examples/CoreComponentsDemo
        timeout-minutes: 15
        continue-on-error: true
      
      - name: Build Liquid UI Demo
        run: swift build
        working-directory: Examples/LiquidUIDemo
        timeout-minutes: 15
        continue-on-error: true

  test-summary:
    name: Test Summary & Reporting
    needs: [test-matrix, smoke-tests, integration-tests, gpu-tests, configuration-tests, ui-tests, build-examples]
    runs-on: macos-15
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate Test Summary
        run: |
          echo "# 🎯 LuxeUI CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.test-matrix.result == 'success' && '✅ PASSED' || '❌ FAILED' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Individual Test Suites" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Tests**: ${{ needs.smoke-tests.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Integration Tests**: ${{ needs.integration-tests.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **GPU Renderer Tests**: ${{ needs.gpu-tests.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Configuration Tests**: ${{ needs.configuration-tests.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI Tests**: ${{ needs.ui-tests.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Example Builds**: ${{ needs.build-examples.result == 'success' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "- 159+ tests across 47 test suites executed" >> $GITHUB_STEP_SUMMARY
          echo "- All components tested: Smoke, Integration, Configuration, UI, GPU rendering" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if critical tests failed
        if: |
          needs.test-matrix.result == 'failure' ||
          needs.smoke-tests.result == 'failure' ||
          needs.integration-tests.result == 'failure' ||
          needs.gpu-tests.result == 'failure' ||
          needs.configuration-tests.result == 'failure' ||
          needs.ui-tests.result == 'failure'
        run: |
          echo "❌ Critical tests failed!"
          exit 1
